<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gomoku</title>
    <style>
        :root { --bg: #1a1a1a; --wood: #dcb35c; --line: #5c4033; --accent: #fff; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Theme Support */
        .theme-dark { --bg: #121212; --wood: #333; --line: #555; }
        
        #game-ui { text-align: center; width: 100%; max-width: 600px; }
        #board { display: grid; grid-template-columns: repeat(15, 1fr); width: 90vmin; height: 90vmin; background: var(--wood); margin: 20px auto; border: 2px solid var(--line); cursor: pointer; }
        .cell { border: 0.5px solid var(--line); position: relative; }
        
        .stone { width: 80%; height: 80%; border-radius: 50%; position: absolute; top: 10%; left: 10%; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); animation: drop 0.2s ease-out; }
        .black { background: radial-gradient(circle at 30% 30%, #555, #000); }
        .white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); }
        @keyframes drop { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .stats { margin: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h1>Ultimate Gomoku</h1>
        <div class="stats" id="stats-display">승: 0 | 패: 0</div>
        <div id="timer">남은 시간: 30s</div>
        <div id="board"></div>
        <select onchange="changeTheme(this.value)">
            <option value="">우드 테마</option>
            <option value="theme-dark">다크 테마</option>
        </select>
    </div>
    
    <script>
        let state = Array(225).fill(null);
        let stats = JSON.parse(localStorage.getItem('gomokuStats')) || {wins: 0, losses: 0};
        let timeLeft = 30;
        let timer;

        function init() {
            document.getElementById('board').innerHTML = '';
            state = Array(225).fill(null);
            for(let i=0; i<225; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => play(i);
                document.getElementById('board').appendChild(cell);
            }
            startTimer();
        }

        function play(idx) {
            if(state[idx]) return;
            state[idx] = 'black';
            render();
            // Simple AI Heuristic
            setTimeout(() => aiMove(), 500);
        }

        function aiMove() {
            // Find best move (simple: block or random neighbor)
            let moves = state.map((v,i) => v === null ? i : null).filter(v => v !== null);
            let move = moves[Math.floor(Math.random() * moves.length)];
            state[move] = 'white';
            render();
        }

        function render() {
            let cells = document.querySelectorAll('.cell');
            state.forEach((v, i) => {
                if(v && !cells[i].firstChild) {
                    let stone = document.createElement('div');
                    stone.className = `stone ${v}`;
                    cells[i].appendChild(stone);
                }
            });
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 30;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `남은 시간: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("시간 초과!");
                }
            }, 1000);
        }

        function changeTheme(theme) {
            document.body.className = theme;
        }

        init();
    </script>
</body>
</html>
