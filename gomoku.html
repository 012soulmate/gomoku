<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Gomoku AI</title>
    <style>
        :root {
            --bg: #2d241d;
            --wood: #e0b070;
            --line: #5e4630;
            --accent: #fff;
        }
        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', sans-serif;
            color: white;
        }

        #top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 20px;
            background: #333;
        }

        #mode-select {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #777; }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            width: 90vmin;
            height: 95vmin;
            background: var(--wood);
            background-image: 
                linear-gradient(to right, var(--line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line) 1px, transparent 1px);
            background-size: calc(100% / 15) calc(100% / 15);
            background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.1);
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .cell { position: relative; cursor: pointer; }

        .stone {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            position: absolute;
            top: 10%; left: 10%;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.2);
            animation: appear 0.3s ease-out;
        }

        @keyframes appear {
            0% { transform: scale(0.2); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .black { background: radial-gradient(circle at 30% 30%, #555, #000); }
        .white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); }

        .last-move::after {
            content: '';
            width: 30%; height: 30%;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: 35%; left: 35%;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="mode-select">
        <button onclick="startGame('pvp')">2인 플레이</button>
        <button onclick="startGame('pve')">AI 대전</button>
    </div>

    <div id="top-bar">
        <div id="turn" class="status">모드를 선택하세요</div>
        <button onclick="startGame(currentMode)">새 게임</button>
    </div>

    <div id="board"></div>

    <div id="modal">
        <h1 id="winner-text">승리!</h1>
        <button onclick="modal.style.display='none'">닫기</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const turnText = document.getElementById('turn');
        const modal = document.getElementById('modal');
        const winnerText = document.getElementById('winner-text');
        
        let state, turn, currentMode, active, isAiThinking;

        function startGame(mode) {
            currentMode = mode;
            board.innerHTML = '';
            state = Array(225).fill(null);
            turn = 'black';
            active = true;
            isAiThinking = false;
            turnText.textContent = `모드: ${mode === 'pvp' ? '2인' : 'AI'} | 흑 차례`;
            modal.style.display = 'none';

            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => play(i, cell);
                board.appendChild(cell);
            }
        }

        function play(idx, cell) {
            if (!active || state[idx] || (isAiThinking && currentMode === 'pve')) return;

            makeMove(idx, cell);
            if (active && currentMode === 'pve' && turn === 'white') {
                isAiThinking = true;
                setTimeout(aiMove, 600);
            }
        }

        function makeMove(idx, cell) {
            state[idx] = turn;
            const stone = document.createElement('div');
            stone.className = `stone ${turn}`;
            cell.appendChild(stone);

            if (check(idx)) {
                active = false;
                winnerText.textContent = (turn === 'black' ? '흑' : '백') + ' 승리!';
                modal.style.display = 'flex';
                return;
            }

            turn = turn === 'black' ? 'white' : 'black';
            turnText.textContent = `모드: ${currentMode === 'pvp' ? '2인' : 'AI'} | ${turn === 'black' ? '흑' : '백'} 차례`;
        }

        function hasNeighbor(idx) {
            const r = Math.floor(idx / 15), c = idx % 15;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && state[nr * 15 + nc] !== null) {
                        return true;
                    }
                }
            }
            return false;
        }

        function aiMove() {
            const emptyCells = state.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (emptyCells.length === 0) return;
            
            // Prefer neighbors
            const preferredCells = emptyCells.filter(hasNeighbor);
            const candidates = preferredCells.length > 0 ? preferredCells : emptyCells;
            
            const randomIdx = candidates[Math.floor(Math.random() * candidates.length)];
            const cell = board.children[randomIdx];
            
            makeMove(randomIdx, cell);
            isAiThinking = false;
        }

        function check(idx) {
            const dirs = [[0,1], [1,0], [1,1], [1,-1]];
            const r = Math.floor(idx / 15), c = idx % 15;
            for(let [dr, dc] of dirs) {
                let count = 1;
                for(let i=1; i<5; i++) {
                    let nr = r + dr*i, nc = c + dc*i;
                    if(nr>=0 && nr<15 && nc>=0 && nc<15 && state[nr*15+nc] === turn) count++;
                    else break;
                }
                for(let i=1; i<5; i++) {
                    let nr = r - dr*i, nc = c - dc*i;
                    if(nr>=0 && nr<15 && nc>=0 && nc<15 && state[nr*15+nc] === turn) count++;
                    else break;
                }
                if(count >= 5) return true;
            }
            return false;
        }
    </script>
</body>
</html>
